    const ct=Uint8Array.from(atob(D.ct),c=>c.charCodeAt(0));
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
    document.open();document.write(new TextDecoder().decode(plain));document.close();
  }catch(e){document.getElementById("err").style.display="block";}
  return false;
}
</script>
