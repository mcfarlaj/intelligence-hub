<style>

  .lock h1 { font-size: 24px; color: #111; margin-bottom: 8px; }
  .lock p { font-size: 14px; color: #666; margin-bottom: 24px; }
  .lock input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; outline: none; }

  .lock button { width: 100%; padding: 12px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .lock button:hover { background: #4338CA; }
  .error { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>

  <h1>Disruption Watch</h1>

  </form>

</div>

document.getElementById("f").addEventListener("submit",function(e){
  e.preventDefault();
  const pw=document.getElementById("pw").value;
  (async function(){
    try{
      const enc=new TextEncoder();
      const salt=Uint8Array.from(atob(D.salt),c=>c.charCodeAt(0));
      const iv=Uint8Array.from(atob(D.iv),c=>c.charCodeAt(0));
      const ct=Uint8Array.from(atob(D.ct),c=>c.charCodeAt(0));
      const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
      const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
      const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
      document.open();document.write(new TextDecoder().decode(plain));document.close();
    }catch(e){document.getElementById("err").style.display="block";}
  })();
});
